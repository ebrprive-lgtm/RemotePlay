<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="theme-color" content="#1a1a2e"/>
<title>RemotePlay Offline</title>
<style>
body{margin:0;min-height:100vh;display:grid;place-items:center;background:#111;color:#eee;font-family:Segoe UI,Arial,sans-serif;padding:1rem}.card{max-width:460px;background:#1a1a2e;border:1px solid #30304a;border-radius:18px;padding:1.2rem;box-shadow:0 10px 34px rgba(0,0,0,.4)}h1{margin:.2rem 0 .7rem;color:#e94560}p{line-height:1.45;color:#cfd3e9}.button{display:inline-flex;margin-top:.7rem;background:#e94560;color:#fff;text-decoration:none;border-radius:999px;padding:.65rem .9rem;font-weight:800}
</style>
</head>
<body>
<main class="card">
<h1>RemotePlay is offline</h1>
<p>The remote shell is cached, but the media computer is not reachable right now. Reconnect to the same network and try again.</p>
<a class="button" href="/">Retry</a>
</main>
</body>
</html>
