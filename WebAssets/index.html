        <!DOCTYPE html>
        <html lang="en">
        <head>
        <meta charset="UTF-8"/>
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
        <meta name="theme-color" content="#1a1a2e"/>
        <meta name="mobile-web-app-capable" content="yes"/>
        <meta name="apple-mobile-web-app-capable" content="yes"/>
        <meta name="apple-mobile-web-app-title" content="RemotePlay"/>
        <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
        <link rel="manifest" href="/manifest.webmanifest"/>
        <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png"/>
        <title>RemotePlay</title>
        <link rel="stylesheet" href="/styles.css"/></head><body>
        <div id="install-hint"><span>Install RemotePlay from your browser menu for a fullscreen app-like remote.</span><button onclick="dismissInstallHint()">Hide</button></div>
        <header>
          <div id="brand">
            <h1>&#127916; RemotePlay</h1>
            <div id="brand-actions"><div id="brand-row"><a id="health-link" href="/health" target="_blank" rel="noopener"><span id="diag-dot"></span>Health</a><a id="setup-link" href="/setup" target="_blank" rel="noopener">Setup</a><div id="peers-wrap"><button id="peers-btn" onclick="togglePeers()" aria-expanded="false" aria-haspopup="true"><span id="peers-dot"></span>Instances</button><div id="peers-dropdown" role="menu"></div></div></div><select id="theme-select" onchange="setTheme(this.value)" aria-label="Theme"><option value="default">Dark</option><option value="amoled">AMOLED</option><option value="blue">Blue</option><option value="sunset">Sunset Pop</option><option value="neon">Neon Arcade</option><option value="forest">Forest</option><option value="lavender">Pastel Lavender</option><option value="peach">Pastel Peach</option><option value="mint">Pastel Mint</option><option value="high-contrast">High contrast</option></select></div>
            <button id="back-button" class="crumb-back" onclick="goBack()" style="display:none">&#8592; Back</button>
          </div>
          <div id="search-wrap">
            <div id="search-row">
              <input id="search" type="search" placeholder="Search entire library..." oninput="onSearch()" aria-label="Search entire library"/>
              <div id="search-spinner" aria-label="Searching" title="Searching..."></div>
            </div>
            <div id="breadcrumb"></div>
            <div id="count-line"></div>
            <div id="scan-status"></div>
          </div>
          <div id="now-playing-bar" ontouchstart="onPlayerGestureStart(event)" ontouchend="onPlayerGestureEnd(event)">
            <div class="player-top">
              <div id="player-summary"><div id="player-poster"></div><div><div id="player-title">Nothing playing</div><div id="player-meta"></div><div id="connection-status">Connecting...</div><button class="diag-button" onclick="openDiagnostics()">Diagnostics</button></div></div>
              <div class="transport-controls">
                <div class="button-group transport-nav-group">
                  <button id="previous-btn" class="btn btn-nav" onclick="playAdjacent('previous')"><span class="nav-main">Prev</span><span class="nav-title"></span></button>
                  <button id="next-btn" class="btn btn-nav" onclick="playAdjacent('next')"><span class="nav-main">Next</span><span class="nav-title"></span></button>
                </div>
                <div class="button-group transport-main-group">
                  <button id="seek-back-btn" class="btn btn-seek" onclick="quickSkip(-10)" onpointerdown="beginSeekHold(event,-10)" onpointerup="endSeekHold()" onpointercancel="endSeekHold()" onpointerleave="endSeekHold()">-10s</button>
                  <button id="pause-btn" class="btn btn-red" onclick="togglePause()">&#9646;&#9646; Pause</button>
                  <button id="seek-forward-btn" class="btn btn-seek" onclick="quickSkip(10)" onpointerdown="beginSeekHold(event,10)" onpointerup="endSeekHold()" onpointercancel="endSeekHold()" onpointerleave="endSeekHold()">+10s</button>
                  <button id="stop-btn" class="btn btn-stop" onclick="stop()">&#9632; STOP</button>
                </div>
              </div>
            </div>
            <div id="speed-row">
              <button class="speed-chip" data-speed="0.75" onclick="setPlaybackSpeed(0.75)">0.75x</button>
              <button class="speed-chip active" data-speed="1" onclick="setPlaybackSpeed(1)">1.0x</button>
              <button class="speed-chip" data-speed="1.25" onclick="setPlaybackSpeed(1.25)">1.25x</button>
              <button class="speed-chip" data-speed="1.5" onclick="setPlaybackSpeed(1.5)">1.5x</button>
            </div>
            <div id="progress-row">
              <input id="progress" type="range" min="0" max="0" value="0" step="0.1" oninput="onSeekDrag()" onchange="onSeekCommit()" aria-label="Playback position"/>
              <span id="time-label">0:00 / 0:00</span>
            </div>
            <div id="resume-card" aria-live="polite">
              <div><div id="resume-title">Resume playback?</div><div id="resume-detail"></div></div>
              <div id="resume-actions"><button class="btn btn-red" onclick="resumeFromSavedPosition()">Resume</button><button class="btn btn-dim" onclick="startFromBeginning()">Start over</button></div>
            </div>
            <div id="media-controls">
              <div class="control-card">
                <div class="control-title">Profiles</div>
                <div class="profile-grid"><button class="profile-btn profile-chip" id="profile-btn-1" data-profile="1" onpointerdown="profilePointerDown(event,1)" onpointerup="profilePointerUp(event,1)" onpointercancel="profilePointerCancel()" onpointerleave="profilePointerCancel()" onclick="profileClick(event,1)">1<span class="profile-save-indicator">SAVED</span><span class="profile-apply-indicator">OK</span></button><button class="profile-btn profile-chip" id="profile-btn-2" data-profile="2" onpointerdown="profilePointerDown(event,2)" onpointerup="profilePointerUp(event,2)" onpointercancel="profilePointerCancel()" onpointerleave="profilePointerCancel()" onclick="profileClick(event,2)">2<span class="profile-save-indicator">SAVED</span><span class="profile-apply-indicator">OK</span></button><button class="profile-btn profile-chip" id="profile-btn-3" data-profile="3" onpointerdown="profilePointerDown(event,3)" onpointerup="profilePointerUp(event,3)" onpointercancel="profilePointerCancel()" onpointerleave="profilePointerCancel()" onclick="profileClick(event,3)">3<span class="profile-save-indicator">SAVED</span><span class="profile-apply-indicator">OK</span></button><button class="profile-btn profile-chip" id="profile-btn-4" data-profile="4" onpointerdown="profilePointerDown(event,4)" onpointerup="profilePointerUp(event,4)" onpointercancel="profilePointerCancel()" onpointerleave="profilePointerCancel()" onclick="profileClick(event,4)">4<span class="profile-save-indicator">SAVED</span><span class="profile-apply-indicator">OK</span></button></div>
              </div>
              <div class="control-card">
                <div class="control-title">Audio</div>
                <span class="slider-wrap"><button id="volume-icon-btn" class="icon-btn" type="button" onclick="toggleVolumeMute()" aria-label="Toggle volume mute"><svg class="control-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M3 9v6h4l5 4V5L7 9H3zm13.5 3c0-1.8-1-3.3-2.5-4.1v8.2c1.5-.8 2.5-2.3 2.5-4.1zm-2.5-8.7v2.1c2.9 1 5 3.6 5 6.6s-2.1 5.6-5 6.6v2.1c4-1.1 7-4.7 7-8.7s-3-7.6-7-8.7z"/><path class="icon-strike" d="M3 21L21 3"/></svg></button><input id="volume" type="range" min="0" max="1" value="1" step="0.05" oninput="setVolume(this.value)" onchange="setVolume(this.value)" aria-label="Volume"/><span id="volume-label">100%</span></span>
                <span class="slider-wrap"><button id="boost-icon-btn" class="icon-btn off" type="button" onclick="toggleAudioBoostMute()" aria-label="Toggle audio boost"><svg class="control-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M13 2L5 14h5l-1 8 8-12h-5l1-8z"/><path class="icon-strike" d="M3 21L21 3"/></svg></button><input id="audio-boost" type="range" min="0" max="1" value="0" step="0.05" oninput="setAudioBoost(this.value)" onchange="setAudioBoost(this.value)"/><span id="audio-boost-label">0%</span></span>
              </div>
              <div class="control-card">
                <div class="control-title">Display</div>
                <div class="slider-wrap display-slider-wrap"><button class="icon-btn display-icon-btn" type="button" onclick="resetBrightnessMid()" aria-label="Reset brightness to midpoint"><svg class="control-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 4.5a7.5 7.5 0 1 0 0 15V4.5zm0-2v2-2zm0 19v-2 2zm9.5-9.5h-2 2zm-19 0h2-2zm16.4-6.4-1.4 1.4 1.4-1.4zM5.1 18.9l1.4-1.4-1.4 1.4zm13.8 0-1.4-1.4 1.4 1.4zM5.1 5.1l1.4 1.4-1.4-1.4z"/></svg><span class="icon-caption">Brightness</span></button><span class="range-shell"><input id="brightness" type="range" min="0.2" max="0.8" value="0.5" step="0.01" oninput="setBrightness(this.value)" onchange="setBrightness(this.value)"/><span class="mid-marker mid-marker-bottom" aria-hidden="true"></span></span><span id="brightness-label">50%</span></div>
                <div class="slider-wrap display-slider-wrap"><button class="icon-btn display-icon-btn" type="button" onclick="resetSaturationMid()" aria-label="Reset saturation to midpoint"><svg class="control-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2 3 7v10l9 5 9-5V7l-9-5zm0 2.2L19 8v8l-7 3.8L5 16V8l7-3.8z"/></svg><span class="icon-caption">Saturation</span></button><span class="range-shell"><input id="saturation" type="range" min="0" max="2" value="1" step="0.01" oninput="setSaturation(this.value)" onchange="setSaturation(this.value)"/></span><span id="saturation-label">100%</span></div>
                <div class="slider-wrap display-slider-wrap zoom-slider-wrap"><button class="icon-btn display-icon-btn" type="button" onclick="resetZoomDefault()" aria-label="Reset zoom to default"><svg class="control-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M10 4a6 6 0 1 0 3.78 10.66l4.28 4.28 1.41-1.41-4.28-4.28A6 6 0 0 0 10 4zm0 2a4 4 0 1 1 0 8 4 4 0 0 1 0-8z"/><path d="M10 7v6M7 10h6"/></svg><span class="icon-caption">Zoom</span></button><span class="range-shell"><input id="zoom" type="range" min="1" max="2" value="1" step="0.01" onpointerdown="onZoomPointerDown()" onpointerup="onZoomPointerUp()" onpointercancel="onZoomPointerUp()" oninput="setZoomPreview(this.value)" onchange="commitZoom(this.value)"/></span><span id="zoom-label">100%</span></div>
              </div>
              <div id="options-card" class="control-card" style="display:none">
                <div id="track-controls" class="track-select-row" style="display:none">
                  <div id="audio-track-group" class="track-group" style="display:none">
                    <div class="track-group-label">Audio</div>
                    <select id="audio-track-select" class="track-select" onchange="setAudioTrack(this.value)" aria-label="Audio"></select>
                  </div>
                  <div id="subtitle-track-group" class="track-group" style="display:none">
                    <div class="track-group-label">Subtitles</div>
                    <select id="subtitle-track-select" class="track-select" onchange="setSubtitleTrack(this.value)" aria-label="Subtitles"></select>
                  </div>
                </div>
              </div>
              <div id="queue-card" class="control-card">
                <div class="control-title">Queue</div>
                <div id="queue-list" class="queue-list"><div class="queue-empty">Queue is empty</div></div>
                <div class="control-actions"><button class="btn btn-dim" onclick="clearQueue()">Clear queue</button></div>
              </div>
            </div>
            <div id="error"></div>
          </div>
        </header>
        <div id="status" style="display:none">Loading...</div>
        <div id="browser"></div>
        <div id="diagnostics-overlay" onclick="if(event.target===this)closeDiagnostics()"><div id="diagnostics-panel"><h2>RemotePlay diagnostics</h2><dl id="diagnostics-content"></dl><div id="maintenance-actions"><h3>Maintenance</h3><div id="thumb-status"></div><div class="control-actions"><button class="btn btn-dim" onclick="rescan()">Rescan library</button><button class="btn btn-dim" onclick="startThumbnailQueue()">Generate thumbnails</button></div></div><div class="control-actions"><button class="btn btn-dim" onclick="refreshDiagnostics()">Refresh</button><button class="btn btn-red" onclick="closeDiagnostics()">Close</button></div></div></div>
        <script src="/app.js" defer></script>
        </body></html>
